<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Product Recommendation NLP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2933;
        }

        .page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 32px;
        }

        .hero h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        .hero p {
            margin: 0;
            color: #607080;
            font-size: 17px;
        }

        .search-box {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            margin-bottom: 28px;
        }

        .search-row {
            display: flex;
            gap: 12px;
        }

        input, select {
            padding: 14px 16px;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background: white;
        }

        input {
            flex: 1;
            font-size: 18px;
        }

        input:focus, select:focus {
            border-color: #2563eb;
        }

        button {
            padding: 0 26px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .examples {
            margin-top: 14px;
            color: #607080;
            font-size: 14px;
        }

        .example-link {
            color: #2563eb;
            cursor: pointer;
            margin-right: 10px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 18px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group.hidden {
            display: none;
        }

        .filter-group label {
            color: #607080;
            font-size: 13px;
        }

        .status {
            margin: 16px 0;
            color: #607080;
        }

        .results {
            display: grid;
            gap: 16px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.07);
            border-left: 6px solid #2563eb;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .product-title {
            margin: 0;
            font-size: 22px;
        }

        .category {
            color: #607080;
            margin-top: 4px;
        }

        .score {
            min-width: 86px;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: bold;
            font-size: 20px;
        }

        .meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 16px 0;
            color: #344054;
        }

        .attributes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 14px;
        }

        .attribute {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            color: #344054;
        }

        .reason {
            margin: 12px 0;
            line-height: 1.5;
        }

        .keywords {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .keyword {
            background: #eef2f7;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            color: #344054;
        }

        .empty {
            background: white;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            color: #607080;
        }

        @media (max-width: 900px) {
            .search-row {
                flex-direction: column;
            }

            button {
                padding: 14px;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .product-header {
                flex-direction: column;
            }

            .score {
                text-align: left;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <h1>Wyszukiwarka produktów NLP</h1>
        <p>Wpisz, czego szukasz, a system pokaże najlepiej dopasowane produkty.</p>
    </section>

    <section class="search-box">
        <div class="search-row">
            <input
                    id="queryInput"
                    type="text"
                    placeholder="Np. buty wodoodporne do chodzenia po górach"
                    autocomplete="off"
            >
            <button id="searchButton" onclick="searchProducts()">Szukaj</button>
        </div>

        <div class="examples">
            Przykłady:
            <span class="example-link" onclick="setExample('buty wodoodporne w góry')">buty w góry</span>
            <span class="example-link" onclick="setExample('czarna sukienka na randkę')">sukienka na randkę</span>
            <span class="example-link" onclick="setExample('plecak trekkingowy w góry')">plecak trekkingowy</span>
            <span class="example-link" onclick="setExample('kurtka przeciwdeszczowa')">kurtka przeciwdeszczowa</span>
        </div>

        <div class="filters">
            <div class="filter-group" id="categoryGroup">
                <label for="categoryFilter">Kategoria</label>
                <select id="categoryFilter">
                    <option value="">Dowolna kategoria</option>
                    <option value="obuwie">Obuwie</option>
                    <option value="odzież">Odzież</option>
                    <option value="akcesoria">Akcesoria</option>
                </select>
            </div>

            <div class="filter-group hidden" id="genderGroup">
                <label for="genderFilter">Dla kogo</label>
                <select id="genderFilter">
                    <option value="">Dowolnie</option>
                    <option value="męskie">Mężczyzna</option>
                    <option value="damskie">Kobieta</option>
                    <option value="unisex">Unisex</option>
                </select>
            </div>

            <div class="filter-group hidden" id="productTypeGroup">
                <label for="productTypeFilter">Rodzaj produktu</label>
                <select id="productTypeFilter">
                    <option value="">Dowolny rodzaj produktu</option>
                </select>
            </div>

            <div class="filter-group hidden" id="colorGroup">
                <label for="colorFilter">Kolor</label>
                <select id="colorFilter">
                    <option value="">Dowolny kolor</option>
                    <option value="czarny">Czarny</option>
                    <option value="brązowy">Brązowy</option>
                    <option value="biały">Biały</option>
                    <option value="beżowy">Beżowy</option>
                    <option value="czerwony">Czerwony</option>
                    <option value="niebieski">Niebieski</option>
                    <option value="zielony">Zielony</option>
                    <option value="szary">Szary</option>
                    <option value="różowy">Różowy</option>
                </select>
            </div>
        </div>
    </section>

    <div id="status" class="status"></div>
    <section id="results" class="results"></section>
</div>

<script>
    const queryInput = document.getElementById("queryInput");
    const searchButton = document.getElementById("searchButton");
    const statusBox = document.getElementById("status");
    const resultsBox = document.getElementById("results");

    const genderGroup = document.getElementById("genderGroup");
    const productTypeGroup = document.getElementById("productTypeGroup");
    const colorGroup = document.getElementById("colorGroup");

    const categoryFilter = document.getElementById("categoryFilter");
    const genderFilter = document.getElementById("genderFilter");
    const productTypeFilter = document.getElementById("productTypeFilter");
    const colorFilter = document.getElementById("colorFilter");

    const productTypesByCategory = {
        "obuwie": [
            { value: "buty trekkingowe", label: "Buty trekkingowe", genders: ["męskie", "damskie", "unisex"] },
            { value: "sneakersy", label: "Sneakersy", genders: ["męskie", "damskie", "unisex"] },
            { value: "trampki", label: "Trampki", genders: ["męskie", "damskie", "unisex"] },
            { value: "sandały", label: "Sandały", genders: ["męskie", "damskie", "unisex"] },
            { value: "kalosze", label: "Kalosze", genders: ["męskie", "damskie", "unisex"] },
            { value: "buty biegowe", label: "Buty biegowe", genders: ["męskie", "damskie", "unisex"] },
            { value: "buty zimowe", label: "Buty zimowe", genders: ["męskie", "damskie", "unisex"] },
            { value: "buty robocze", label: "Buty robocze", genders: ["męskie", "unisex"] },
            { value: "półbuty", label: "Półbuty", genders: ["męskie"] },
            { value: "szpilki", label: "Szpilki", genders: ["damskie"] },
            { value: "czółenka", label: "Czółenka", genders: ["damskie"] },
            { value: "botki", label: "Botki", genders: ["damskie"] },
            { value: "kozaki", label: "Kozaki", genders: ["damskie"] }
        ],
        "odzież": [
            { value: "kurtka przeciwdeszczowa", label: "Kurtka przeciwdeszczowa", genders: ["męskie", "damskie", "unisex"] },
            { value: "kurtka zimowa", label: "Kurtka zimowa", genders: ["męskie", "damskie", "unisex"] },
            { value: "bluza", label: "Bluza", genders: ["męskie", "damskie", "unisex"] },
            { value: "koszulka", label: "Koszulka", genders: ["męskie", "damskie", "unisex"] },
            { value: "spodnie trekkingowe", label: "Spodnie trekkingowe", genders: ["męskie", "damskie", "unisex"] },
            { value: "jeansy", label: "Jeansy", genders: ["męskie", "damskie", "unisex"] },
            { value: "sukienka", label: "Sukienka", genders: ["damskie"] },
            { value: "spódnica", label: "Spódnica", genders: ["damskie"] }
        ],
        "akcesoria": [
            { value: "plecak trekkingowy", label: "Plecak trekkingowy", genders: ["męskie", "damskie", "unisex"] },
            { value: "plecak miejski", label: "Plecak miejski", genders: ["męskie", "damskie", "unisex"] },
            { value: "czapka", label: "Czapka", genders: ["męskie", "damskie", "unisex"] },
            { value: "rękawiczki", label: "Rękawiczki", genders: ["męskie", "damskie", "unisex"] },
            { value: "skarpety trekkingowe", label: "Skarpety trekkingowe", genders: ["męskie", "damskie", "unisex"] },
            { value: "torba sportowa", label: "Torba sportowa", genders: ["męskie", "damskie", "unisex"] },
            { value: "torebka", label: "Torebka", genders: ["damskie"] }
        ]
    };

    queryInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            searchProducts();
        }
    });

    categoryFilter.addEventListener("change", function () {
        resetGenderSelect();
        resetProductTypeSelect();
        resetColorSelect();

        hide(productTypeGroup);
        hide(colorGroup);

        if (categoryFilter.value) {
            show(genderGroup);
        } else {
            hide(genderGroup);
        }

        clearResults();
    });

    genderFilter.addEventListener("change", function () {
        resetProductTypeSelect();
        resetColorSelect();
        hide(colorGroup);

        if (genderFilter.value && categoryFilter.value) {
            populateProductTypes();
            show(productTypeGroup);
        } else {
            hide(productTypeGroup);
        }

        clearResults();
    });

    productTypeFilter.addEventListener("change", function () {
        resetColorSelect();

        if (productTypeFilter.value || productTypeFilter.selectedIndex > 0) {
            show(colorGroup);
        } else {
            hide(colorGroup);
        }

        clearResults();
    });

    colorFilter.addEventListener("change", clearResults);

    function show(element) {
        element.classList.remove("hidden");
    }

    function hide(element) {
        element.classList.add("hidden");
    }

    function resetGenderSelect() {
        genderFilter.innerHTML = `
            <option value="">Dowolnie</option>
            <option value="męskie">Mężczyzna</option>
            <option value="damskie">Kobieta</option>
            <option value="unisex">Unisex</option>
        `;
    }

    function resetProductTypeSelect() {
        productTypeFilter.innerHTML = `
            <option value="">Dowolny rodzaj produktu</option>
        `;
    }

    function resetColorSelect() {
        colorFilter.innerHTML = `
            <option value="">Dowolny kolor</option>
            <option value="czarny">Czarny</option>
            <option value="brązowy">Brązowy</option>
            <option value="biały">Biały</option>
            <option value="beżowy">Beżowy</option>
            <option value="czerwony">Czerwony</option>
            <option value="niebieski">Niebieski</option>
            <option value="zielony">Zielony</option>
            <option value="szary">Szary</option>
            <option value="różowy">Różowy</option>
        `;
    }

    function populateProductTypes() {
        const selectedCategory = categoryFilter.value;
        const selectedGender = genderFilter.value;

        resetProductTypeSelect();

        if (!selectedCategory || !selectedGender) {
            return;
        }

        const availableTypes = productTypesByCategory[selectedCategory] || [];

        availableTypes
            .filter(type => isProductTypeAvailableForGender(type, selectedGender))
            .forEach(type => {
                const option = document.createElement("option");
                option.value = type.value;
                option.textContent = type.label;
                productTypeFilter.appendChild(option);
            });
    }

    function isProductTypeAvailableForGender(type, selectedGender) {
        if (selectedGender === "unisex") {
            return type.genders.includes("unisex");
        }

        return type.genders.includes(selectedGender) || type.genders.includes("unisex");
    }

    function setExample(text) {
        queryInput.value = text;
    }

    async function searchProducts() {
        const query = queryInput.value.trim();

        if (!query) {
            statusBox.textContent = "Wpisz zapytanie, np. „buty wodoodporne do chodzenia po górach”.";
            resultsBox.innerHTML = "";
            return;
        }

        searchButton.disabled = true;
        statusBox.textContent = "Szukam najlepiej dopasowanych produktów...";
        resultsBox.innerHTML = "";

        try {
            const response = await fetch("/api/recommendations", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json; charset=UTF-8"
                },
                body: JSON.stringify({
                    query: query,
                    maxResults: 5,
                    mainCategory: normalizeOptionalFilter(categoryFilter.value),
                    targetGender: normalizeOptionalFilter(genderFilter.value),
                    productType: normalizeOptionalFilter(productTypeFilter.value),
                    color: normalizeOptionalFilter(colorFilter.value)
                })
            });

            if (!response.ok) {
                throw new Error("Request failed with status " + response.status);
            }

            const results = await response.json();
            renderResults(results);
        } catch (error) {
            statusBox.textContent = "Wystąpił błąd podczas wyszukiwania. Sprawdź, czy backend działa.";
            console.error(error);
        } finally {
            searchButton.disabled = false;
        }
    }

    function normalizeOptionalFilter(value) {
        if (!value || value.trim() === "") {
            return null;
        }

        return value;
    }

    function renderResults(results) {
        if (!results || results.length === 0) {
            statusBox.textContent = "";
            resultsBox.innerHTML = `
                <div class="empty">
                    Nie znaleziono pasujących produktów dla wybranych filtrów. Spróbuj zmienić zapytanie lub filtry.
                </div>
            `;
            return;
        }

        statusBox.textContent = `Znaleziono ${results.length} najlepiej dopasowanych produktów.`;

        resultsBox.innerHTML = results
            .map(product => createProductCard(product))
            .join("");
    }

    function createProductCard(product) {
        const keywords = Array.from(product.matchedKeywords || [])
            .slice(0, 8)
            .map(keyword => `<span class="keyword">${escapeHtml(keyword)}</span>`)
            .join("");

        return `
            <article class="product-card">
                <div class="product-header">
                    <div>
                        <h2 class="product-title">${escapeHtml(product.productName)}</h2>
                        <div class="category">
                            ${escapeHtml(product.mainCategory || "Brak kategorii")}
                            ${product.subCategory ? " / " + escapeHtml(product.subCategory) : ""}
                            ${product.productType ? " / " + escapeHtml(product.productType) : ""}
                        </div>
                    </div>
                    <div class="score">${product.score}/100</div>
                </div>

                <div class="meta">
                    <span>Cena: ${formatPrice(product.price)}</span>
                    <span>Ocena: ${product.rating ?? "brak"}/5</span>
                    <span>Opinie: ${product.reviewsCount ?? 0}</span>
                </div>

                <div class="attributes">
                    <span class="attribute">Dla: ${escapeHtml(product.targetGender || "brak")}</span>
                    <span class="attribute">Kolor: ${escapeHtml(product.color || "brak")}</span>
                    <span class="attribute">Sezon: ${escapeHtml(product.season || "brak")}</span>
                    <span class="attribute">Wodoodporne: ${product.waterproof ? "tak" : "nie"}</span>
                </div>

                <p class="reason">${escapeHtml(product.reason)}</p>

                <div class="keywords">
                    ${keywords}
                </div>
            </article>
        `;
    }

    function clearResults() {
        statusBox.textContent = "";
        resultsBox.innerHTML = "";
    }

    function formatPrice(price) {
        if (price === null || price === undefined) {
            return "brak danych";
        }

        return Number(price).toFixed(2) + " zł";
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return "";
        }

        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
